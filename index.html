<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Imposztor Játék</title>
    <style>
        :root {
            /* Pasztell színvilág */
            --bg-top: #a1c4fd; /* Pasztell kék */
            --bg-bottom: #c2e9fb;
            --primary: #ffb7b2; /* Pasztell rózsaszín */
            --primary-dark: #ff9a9e;
            --secondary: #b9fbc0; /* Pasztell menta */
            --accent: #cdb4db; /* Pasztell lila */
            --card-front: #ffffff;
            --card-back: #f8f9fa;
            --text-dark: #4a4e69;
            --text-light: #9a8c98;
            --easing: cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 90%;
            max-width: 420px;
            perspective: 1000px;
            position: relative;
            height: 600px; /* Fix magasság, hogy semmi ne ugráljon */
        }

        .screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            width: 100%;
            box-sizing: border-box;
            background-color: rgba(255, 255, 255, 0.95);
            padding: 30px 20px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s var(--easing);
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        h1 {
            color: var(--text-dark);
            margin-top: 0;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
        }

        .instruction {
            font-size: 1.1rem;
            margin-bottom: 25px;
            color: var(--text-light);
        }

        /* Játékosszám választó */
        .player-stepper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stepper-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(205, 180, 219, 0.4);
            transition: transform 0.2s var(--easing);
        }

        .stepper-btn:active {
            transform: scale(0.85);
        }

        #player-count-display {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--text-dark);
            min-width: 70px;
        }

        /* Gombok */
        button.main-btn {
            background-color: var(--primary);
            color: var(--text-dark);
            border: none;
            padding: 16px 24px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 8px 20px rgba(255, 183, 178, 0.5);
            transition: all 0.3s var(--easing);
        }

        button.main-btn:active {
            transform: translateY(4px) scale(0.96);
            box-shadow: 0 4px 10px rgba(255, 183, 178, 0.3);
        }

        /* Gomb tartó (hogy ne ugorjon a layout) */
        .action-area {
            height: 70px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        /* Kártya */
        .card-container {
            width: 100%;
            max-width: 260px;
            height: 360px;
            margin: 0 auto;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none; /* Mobilos menü letiltása hosszan nyomásnál */
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 25px;
            padding: 20px;
            box-sizing: border-box;
            -webkit-backface-visibility: hidden;
        }

        .card-front {
            background-color: var(--card-front);
            border: 4px solid var(--accent);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(205, 180, 219, 0.1) 10px, rgba(205, 180, 219, 0.1) 20px);
        }

        .card-front h2 {
            font-size: 1.6rem;
            color: var(--text-dark);
            margin-bottom: 5px;
        }

        .card-back {
            background-color: var(--card-back);
            transform: rotateY(180deg);
            border: 4px solid var(--primary);
        }

        .role-text {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .role-normal { color: #52b788; } /* Pasztell zöldes */
        .role-imposter { color: #e56b6f; } /* Pasztell pirosas */

        .word-display {
            /* Dinamikus betűméret és sortörés, hogy sose lógjon ki */
            font-size: clamp(1.5rem, 8vw, 2.2rem);
            font-weight: 800;
            color: var(--text-dark);
            margin: 15px 0;
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            text-align: center;
            width: 100%;
            line-height: 1.2;
        }

        #starter-player {
            font-size: 2.2rem;
            color: var(--text-dark);
            font-weight: 800;
            margin: 30px 0;
            padding: 20px;
            background-color: var(--secondary);
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(185, 251, 192, 0.4);
        }

    </style>
</head>
<body>

    <div class="container">
        
        <div id="setup-screen" class="screen active">
            <h1>Imposztor</h1>
            <p class="instruction">Hányan fogtok játszani?</p>
            
            <div class="player-stepper">
                <button class="stepper-btn" onclick="changePlayers(-1)">-</button>
                <div id="player-count-display">4</div>
                <button class="stepper-btn" onclick="changePlayers(1)">+</button>
            </div>
            
            <div class="action-area">
                <button class="main-btn" onclick="startGame()">Játék Indítása</button>
            </div>
        </div>

        <div id="card-screen" class="screen">
            <h1 id="player-turn-text">1. Játékos</h1>
            <p class="instruction">Nyomd le a kártyát, és tartsd nyomva!</p>
            
            <div class="card-container" id="card-trigger">
                <div class="card" id="card-element">
                    <div class="card-face card-front">
                        <h2>Ki vagy te?</h2>
                        <p style="color: var(--text-light);">Tartsd az ujjad a kártyán!</p>
                    </div>
                    <div class="card-face card-back">
                        <div id="role-text" class="role-text">Szerep</div>
                        <div class="word-display" id="secret-word">???</div>
                        <p style="font-size: 0.9rem; color: var(--text-light); margin-top: 10px;">Engedd fel a rejtéshez!</p>
                    </div>
                </div>
            </div>

            <div class="action-area">
                <button class="main-btn" id="next-player-btn" onclick="nextPlayer()" style="opacity: 0; pointer-events: none;">Tovább a következőhöz</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <h1>Mindenki kész!</h1>
            <p class="instruction">Kezdődhet a faggatózás. Ki a gyanús?</p>
            <p style="color: var(--text-light);">A játékot kezdi:</p>
            <div id="starter-player">X. Játékos</div>
            
            <div class="action-area">
                <button class="main-btn" onclick="resetGame()">Új Játék</button>
            </div>
        </div>

    </div>

    <script>
        const wordPairs = [
            // Régiós (Szeged)
            { a: "Szegedi halászlé", b: "Bajai halászlé" },
            { a: "Szegedi Dóm", b: "Esztergomi Bazilika" },
            { a: "Kárász utca", b: "Váci utca" },
            { a: "Szegedi papucs", b: "Gumicsizma" },
            { a: "Pick Szalámi", b: "Herz Szalámi" },
            
            // Trágár / Viccesen pikáns
            { a: "Faszkalap", b: "Seggfej" },
            { a: "Kurva", b: "Rongy" },
            { a: "Beszari", b: "Fosós" },
            { a: "Szarrágó", b: "Skót" },
            
            // Vicces
            { a: "Zokniszandál", b: "Crocs" },
            { a: "Mamahotel", b: "Kollégium" },
            { a: "Sörhas", b: "Kockahas" },
            { a: "Puki", b: "Fing" },
            { a: "Másnaposság", b: "Részegség" }
        ];

        let playerCount = 4;
        let currentPlayer = 1;
        let imposterIndex = 0;
        let normalWord = "";
        let imposterWord = "";
        let currentScreen = 'setup-screen';
        let wordSeen = false;

        function switchScreen(screenId) {
            const currentEl = document.getElementById(currentScreen);
            const nextEl = document.getElementById(screenId);

            currentEl.classList.remove('active');
            
            setTimeout(() => {
                nextEl.classList.add('active');
                currentScreen = screenId;
            }, 500); // Várjuk meg az animációt
        }

        function changePlayers(delta) {
            const display = document.getElementById('player-count-display');
            playerCount = Math.max(3, Math.min(12, playerCount + delta));
            display.innerText = playerCount;
        }

        function startGame() {
            imposterIndex = Math.floor(Math.random() * playerCount) + 1;

            const randomPairIndex = Math.floor(Math.random() * wordPairs.length);
            const pair = wordPairs[randomPairIndex];

            if (Math.random() > 0.5) {
                normalWord = pair.a;
                imposterWord = pair.b;
            } else {
                normalWord = pair.b;
                imposterWord = pair.a;
            }

            currentPlayer = 1;
            updateCardScreen();
            switchScreen('card-screen');
        }

        function updateCardScreen() {
            document.getElementById('player-turn-text').innerText = currentPlayer + ". Játékos";
            const wordDisplay = document.getElementById('secret-word');
            const roleDisplay = document.getElementById('role-text');
            const nextPlayerBtn = document.getElementById('next-player-btn');
            
            wordSeen = false;
            
            // Gomb elrejtése animálva
            nextPlayerBtn.style.opacity = '0';
            nextPlayerBtn.style.pointerEvents = 'none';
            document.getElementById('card-element').classList.remove('flipped');

            // Szerep és Szó beállítása
            if (currentPlayer === imposterIndex) {
                roleDisplay.innerText = "Te vagy az imposztor!";
                roleDisplay.className = "role-text role-imposter";
                wordDisplay.innerText = imposterWord;
            } else {
                roleDisplay.innerText = "Te a többséghez tartozol.";
                roleDisplay.className = "role-text role-normal";
                wordDisplay.innerText = normalWord;
            }
        }

        // --- MODERN KÁRTYA INTERAKCIÓ ---
        const cardTrigger = document.getElementById('card-trigger');
        const cardElement = document.getElementById('card-element');
        const nextPlayerBtn = document.getElementById('next-player-btn');

        // Pointer eseményeket használunk, ami lefedi az érintést és az egeret is
        function handlePointerDown(e) {
            if (currentScreen !== 'card-screen') return;
            cardElement.classList.add('flipped');
            wordSeen = true;
        }

        function handlePointerUp(e) {
            if (currentScreen !== 'card-screen') return;
            cardElement.classList.remove('flipped');
            
            // Ha már megnézte, jelenjen meg a "Tovább" gomb finoman
            if (wordSeen) {
                setTimeout(() => {
                    nextPlayerBtn.style.opacity = '1';
                    nextPlayerBtn.style.pointerEvents = 'auto';
                }, 400); // Várja meg, míg visszafordul a kártya
            }
        }

        cardTrigger.addEventListener('pointerdown', handlePointerDown);
        cardTrigger.addEventListener('pointerup', handlePointerUp);
        cardTrigger.addEventListener('pointerleave', handlePointerUp); // Ha lehúzza az ujját/egerét a kártyáról

        // Régebbi mobilböngészők miatt touch események megerősítése
        cardTrigger.addEventListener('touchstart', (e) => { e.preventDefault(); handlePointerDown(e); }, {passive: false});
        cardTrigger.addEventListener('touchend', (e) => { e.preventDefault(); handlePointerUp(e); }, {passive: false});

        function nextPlayer() {
            currentPlayer++;

            if (currentPlayer > playerCount) {
                const starterIndex = Math.floor(Math.random() * playerCount) + 1;
                document.getElementById('starter-player').innerText = starterIndex + ". Játékos";
                switchScreen('game-screen');
            } else {
                // Csak halványuljon ki-be a tartalom, gyorsabb mint a képernyőváltás
                const cardScreen = document.getElementById('card-screen');
                cardScreen.style.opacity = '0';
                
                setTimeout(() => {
                    updateCardScreen();
                    cardScreen.style.opacity = '1';
                }, 300);
            }
        }

        function resetGame() {
            switchScreen('setup-screen');
        }
    </script>
</body>
</html>
