<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light">
    <title>Imposztor Játék</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Élénk, modern játékos színek */
            --bg-top: #4e54c8;
            --bg-bottom: #8f94fb;
            --primary: #ff4757; /* Pirosas/Rózsaszínes */
            --primary-shadow: #c0392b;
            --secondary: #2ed573; /* Zöld */
            --secondary-shadow: #27ae60;
            --accent: #ffa502; /* Narancs/Sárga */
            --accent-shadow: #e67e22;
            --card-front: #ffffff;
            --card-back: #f1f2f6;
            --text-dark: #2f3542;
            --text-light: #747d8c;
            --easing: cubic-bezier(0.34, 1.56, 0.64, 1); /* Rugós animáció */
        }
        
        body {
            font-family: 'Fredoka', sans-serif; /* Az új dundi betűtípus */
            background: linear-gradient(135deg, var(--bg-top), var(--bg-bottom));
            background-attachment: fixed;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            width: 90%;
            max-width: 400px;
            perspective: 1000px;
            position: relative;
            height: 620px;
        }

        .screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 100%;
            box-sizing: border-box;
            background-color: #ffffff;
            padding: 35px 20px;
            border-radius: 35px;
            box-shadow: 0 15px 0 rgba(0,0,0,0.15), 0 25px 30px rgba(0,0,0,0.2); /* 3D doboz hatás */
            border: 4px solid #fff;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s var(--easing);
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        h1 {
            color: var(--primary);
            margin-top: 0;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px #ffeaa7; /* Játékos szöveg árnyék */
        }

        .instruction {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 25px;
            color: var(--text-light);
        }

        /* Játékosszám választó */
        .player-stepper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            background: #f1f2f6;
            padding: 15px;
            border-radius: 25px;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.05);
        }

        .stepper-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 20px;
            font-size: 2.2rem;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--accent-shadow);
            transition: all 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stepper-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 var(--accent-shadow);
        }

        #player-count-display {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--text-dark);
            min-width: 60px;
        }

        /* 3D Gombok */
        button.main-btn {
            background-color: var(--secondary);
            color: white;
            border: none;
            padding: 18px 24px;
            font-size: 1.4rem;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 8px 0 var(--secondary-shadow);
            transition: all 0.1s;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        button.main-btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 var(--secondary-shadow);
        }

        .action-area {
            height: 80px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        /* Kártya és lebegő animáció */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .card-container {
            width: 100%;
            max-width: 250px;
            height: 350px;
            margin: 0 auto;
            cursor: pointer;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            animation: float 3s ease-in-out infinite; /* Lebegés */
        }

        /* Ha le van nyomva, ne lebegjen tovább */
        .card-container:active {
            animation: none; 
            transform: scale(0.95);
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Rugós forgás */
            border-radius: 30px;
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            padding: 20px;
            box-sizing: border-box;
            -webkit-backface-visibility: hidden;
        }

        /* Kártya hátlap (alapállapot) */
        .card-front {
            background-color: var(--primary);
            color: white;
            border: 6px solid #ff7b89;
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.1) 0px, rgba(255,255,255,0.1) 20px, transparent 20px, transparent 40px);
        }

        .card-front h2 {
            font-size: 2rem;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }

        /* Kártya előlap (felfedett szó) */
        .card-back {
            background-color: var(--card-back);
            transform: rotateY(180deg);
            border: 6px solid var(--accent);
        }

        .role-text {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 5px 15px;
            border-radius: 15px;
        }

        .role-normal { 
            color: white;
            background-color: var(--secondary);
            box-shadow: 0 4px 0 var(--secondary-shadow);
        }
        
        .role-imposter { 
            color: white;
            background-color: var(--primary);
            box-shadow: 0 4px 0 var(--primary-shadow);
        }

        .word-display {
            font-size: clamp(1.8rem, 8vw, 2.5rem);
            font-weight: 700;
            color: var(--text-dark);
            margin: 20px 0;
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
            text-align: center;
            width: 100%;
            line-height: 1.1;
        }

        #starter-player {
            font-size: 2.2rem;
            color: white;
            font-weight: 700;
            margin: 25px 0;
            padding: 20px;
            background-color: var(--primary);
            border-radius: 25px;
            box-shadow: 0 8px 0 var(--primary-shadow);
            transform: rotate(-2deg); /* Kicsit játékosan megdöntve */
        }

    </style>
</head>
<body>

    <div class="container">
        
        <div id="setup-screen" class="screen active">
            <h1>IMPOSZTOR</h1>
            <p class="instruction">Hányan fogtok játszani?</p>
            
            <div class="player-stepper">
                <button class="stepper-btn" onclick="changePlayers(-1)">-</button>
                <div id="player-count-display">4</div>
                <button class="stepper-btn" onclick="changePlayers(1)">+</button>
            </div>
            
            <div class="action-area">
                <button class="main-btn" onclick="startGame()">START!</button>
            </div>
        </div>

        <div id="card-screen" class="screen">
            <h1 id="player-turn-text">1. Játékos</h1>
            <p class="instruction" style="font-size: 1rem;">Tartsd lenyomva a kártyát!</p>
            
            <div class="card-container" id="card-trigger">
                <div class="card" id="card-element">
                    <div class="card-face card-front">
                        <h2>Ki vagy?</h2>
                        <p style="font-weight: 600; opacity: 0.9;">Nyomd le az ujjad!</p>
                    </div>
                    <div class="card-face card-back">
                        <div id="role-text" class="role-text">Szerep</div>
                        <div class="word-display" id="secret-word">???</div>
                    </div>
                </div>
            </div>

            <div class="action-area">
                <button class="main-btn" id="next-player-btn" onclick="nextPlayer()" style="opacity: 0; pointer-events: none; background-color: var(--accent); box-shadow: 0 8px 0 var(--accent-shadow);">Következő</button>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <h1>KÉSZ!</h1>
            <p class="instruction">Mindenki megkapta a szavát. Ki a gyanús?</p>
            <p style="font-weight: 600; color: var(--text-light); margin-bottom: 5px;">A játékot kezdi:</p>
            <div id="starter-player">X. Játékos</div>
            
            <div class="action-area">
                <button class="main-btn" onclick="resetGame()">ÚJ JÁTÉK</button>
            </div>
        </div>

    </div>

    <script>
        const wordPairs = [
            { a: "Szegedi halászlé", b: "Bajai halászlé" },
            { a: "Szegedi Dóm", b: "Esztergomi Bazilika" },
            { a: "Kárász utca", b: "Váci utca" },
            { a: "Szegedi papucs", b: "Gumicsizma" },
            { a: "Pick Szalámi", b: "Herz Szalámi" },
            { a: "Faszkalap", b: "Seggfej" },
            { a: "Kurva", b: "Rongy" },
            { a: "Beszari", b: "Fosós" },
            { a: "Zokniszandál", b: "Crocs" },
            { a: "Mamahotel", b: "Kollégium" },
            { a: "Sörhas", b: "Kockahas" },
            { a: "Puki", b: "Fing" },
            { a: "Másnaposság", b: "Részegség" }
        ];

        let playerCount = 4;
        let currentPlayer = 1;
        let imposterIndex = 0;
        let normalWord = "";
        let imposterWord = "";
        let currentScreen = 'setup-screen';
        let wordSeen = false;

        function switchScreen(screenId) {
            const currentEl = document.getElementById(currentScreen);
            const nextEl = document.getElementById(screenId);

            currentEl.classList.remove('active');
            
            setTimeout(() => {
                nextEl.classList.add('active');
                currentScreen = screenId;
            }, 400); 
        }

        function changePlayers(delta) {
            const display = document.getElementById('player-count-display');
            playerCount = Math.max(3, Math.min(12, playerCount + delta));
            display.innerText = playerCount;
        }

        function startGame() {
            imposterIndex = Math.floor(Math.random() * playerCount) + 1;

            const randomPairIndex = Math.floor(Math.random() * wordPairs.length);
            const pair = wordPairs[randomPairIndex];

            if (Math.random() > 0.5) {
                normalWord = pair.a;
                imposterWord = pair.b;
            } else {
                normalWord = pair.b;
                imposterWord = pair.a;
            }

            currentPlayer = 1;
            updateCardScreen();
            switchScreen('card-screen');
        }

        function updateCardScreen() {
            document.getElementById('player-turn-text').innerText = currentPlayer + ". JÁTÉKOS";
            const wordDisplay = document.getElementById('secret-word');
            const roleDisplay = document.getElementById('role-text');
            const nextPlayerBtn = document.getElementById('next-player-btn');
            
            wordSeen = false;
            
            nextPlayerBtn.style.opacity = '0';
            nextPlayerBtn.style.pointerEvents = 'none';
            document.getElementById('card-element').classList.remove('flipped');

            if (currentPlayer === imposterIndex) {
                roleDisplay.innerText = "Te vagy az imposztor!";
                roleDisplay.className = "role-text role-imposter";
                wordDisplay.innerText = imposterWord;
            } else {
                roleDisplay.innerText = "Többségben vagy!";
                roleDisplay.className = "role-text role-normal";
                wordDisplay.innerText = normalWord;
            }
        }

        const cardTrigger = document.getElementById('card-trigger');
        const cardElement = document.getElementById('card-element');
        const nextPlayerBtn = document.getElementById('next-player-btn');

        function handlePointerDown(e) {
            if (currentScreen !== 'card-screen') return;
            cardElement.classList.add('flipped');
            wordSeen = true;
        }

        function handlePointerUp(e) {
            if (currentScreen !== 'card-screen') return;
            cardElement.classList.remove('flipped');
            
            if (wordSeen) {
                setTimeout(() => {
                    nextPlayerBtn.style.opacity = '1';
                    nextPlayerBtn.style.pointerEvents = 'auto';
                }, 400); 
            }
        }

        cardTrigger.addEventListener('pointerdown', handlePointerDown);
        cardTrigger.addEventListener('pointerup', handlePointerUp);
        cardTrigger.addEventListener('pointerleave', handlePointerUp); 
        cardTrigger.addEventListener('touchstart', (e) => { e.preventDefault(); handlePointerDown(e); }, {passive: false});
        cardTrigger.addEventListener('touchend', (e) => { e.preventDefault(); handlePointerUp(e); }, {passive: false});

        function nextPlayer() {
            currentPlayer++;

            if (currentPlayer > playerCount) {
                const starterIndex = Math.floor(Math.random() * playerCount) + 1;
                document.getElementById('starter-player').innerText = starterIndex + ". JÁTÉKOS";
                switchScreen('game-screen');
            } else {
                const cardScreen = document.getElementById('card-screen');
                cardScreen.style.opacity = '0';
                cardScreen.style.transform = 'translate(-50%, -50%) scale(0.9)';
                
                setTimeout(() => {
                    updateCardScreen();
                    cardScreen.style.opacity = '1';
                    cardScreen.style.transform = 'translate(-50%, -50%) scale(1)';
                }, 300);
            }
        }

        function resetGame() {
            switchScreen('setup-screen');
        }
    </script>
</body>
</html>
